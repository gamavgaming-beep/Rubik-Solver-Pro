<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rubik Solver Pro</title>

<meta name="description"
content="Professional 3D Rubik Cube Solver">

<meta name="theme-color"
content="#4f46e5">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="style.css">

<link rel="stylesheet"
href="css/mobile.css">

<link rel="stylesheet"
href="css/desktop.css">

</head>

<body>

<div class="background"></div>

<div class="app">

<!-- =========================
     Header
========================= -->

<header class="topbar">

<div class="logo">

🧩 Rubik Solver Pro

</div>

<nav class="top-actions">

<button id="themeBtn"
title="Theme">

🌙

</button>

<button id="resetBtn"
title="Reset Cube">

Reset

</button>

</nav>

</header>

<!-- =========================
     Main Layout
========================= -->

<main class="layout">

<!-- =========================
     Left Sidebar
========================= -->

<aside class="sidebar">

<h2>

Cube Setup

</h2>

<p class="subtitle">

Customize your cube

</p>

<div class="progress-card">

<p>

Progress

</p>

<div class="progress">

<div id="progressBar">

</div>

</div>

<span id="progressText">

0%

</span>

</div>

<div class="toolbox">

<button id="scrambleBtn">

Random Scramble

</button>

<button id="clearBtn">

Clear Cube

</button>

<button id="solveBtn">

Solve Cube

</button>

</div>

</aside>

<!-- =========================
     Center Workspace
========================= -->

<section class="workspace">

<div class="workspace-header">

<h1>

3D Cube Editor

</h1>

<p>

Drag the cube, tap stickers and choose colors.

</p>

</div>

<!-- =========================
     Three.js Cube Canvas
========================= -->

<div class="cube-card">

<div id="cubeContainer">

<canvas id="cubeCanvas"></canvas>

</div>

</div>

<!-- =========================
     Color Picker
========================= -->

<div class="color-panel">

<h3>

Color Picker

</h3>

<div class="color-picker">

<button class="color white"
data-color="U"
title="White"></button>

<button class="color yellow"
data-color="D"
title="Yellow"></button>

<button class="color red"
data-color="R"
title="Red"></button>

<button class="color orange"
data-color="L"
title="Orange"></button>

<button class="color green"
data-color="F"
title="Green"></button>

<button class="color blue"
data-color="B"
title="Blue"></button>

</div>

</div>

</section>

<!-- =========================
     Right Panel
========================= -->

<aside class="right-panel">

<div class="status-card">

<h2>

Cube Status

</h2>

<p>

Status

</p>

<h3 id="cubeStatus">

Waiting...

</h3>

</div>

<div class="stats-card">

<h2>

Statistics

</h2>

<div class="stat-row">

<span>Moves</span>

<strong id="moveCount">

0

</strong>

</div>

<div class="stat-row">

<span>Current Step</span>

<strong id="currentStep">

0

</strong>

</div>

<div class="stat-row">

<span>Time</span>

<strong id="solveTime">

00:00

</strong>

</div>

</div>

</aside>

</main>

<!-- =========================
     Solution Panel
========================= -->

<section id="solutionPanel">

<div class="panel-card">

<h2>

Solution

</h2>

<p id="moveInfo">

Move 0 / 0

</p>

<h1 id="currentMove">

-

</h1>

<div class="player-controls">

<button id="previousMove">

⏮

</button>

<button id="playPause">

▶

</button>

<button id="nextMove">

⏭

</button>

</div>

<div class="speed-control">

<label for="speedSelect">

Speed

</label>

<select id="speedSelect">

<option value="0.5">0.5x</option>

<option value="1" selected>1x</option>

<option value="2">2x</option>

<option value="4">4x</option>

</select>

</div>

</div>

</section>

</div>

<footer>

<p>

© 2026 Rubik Solver Pro

</p>

</footer>

<!-- =========================
     Libraries
========================= -->

<script src="https://unpkg.com/three@0.179.1/build/three.min.js"></script>

<script src="lib/cube.js"></script>

<script src="lib/solve.js"></script>

<!-- =========================
     Project Scripts
========================= -->

<script src="js/cube-engine.js"></script>

<script src="js/cube-editor.js"></script>

<script src="js/color-picker.js"></script>

<script src="js/solver.js"></script>

<script src="js/animation.js"></script>

<script src="js/player.js"></script>

<script src="js/viewer.js"></script>

<script src="js/ui.js"></script>

<script src="app.js"></script>

</body>

</html>
