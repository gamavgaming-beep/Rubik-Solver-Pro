<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Cube Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

    <!-- Premium Animated Splash Screen -->
    <div id="splash-screen">
        <div class="splash-content">
            <div class="cube-logo-animation">
                <div class="face front"></div>
                <div class="face back"></div>
                <div class="face left"></div>
                <div class="face right"></div>
                <div class="face top"></div>
                <div class="face bottom"></div>
            </div>
            <h1 class="splash-title">RUBIK SOLVER<span>PRO</span></h1>
            <p class="splash-subtitle">Analyzing structural matrix elements...</p>
            <div class="progress-track">
                <div id="loading-progress"></div>
            </div>
        </div>
    </div>

    <!-- Main Production Application Area -->
    <div id="main-app" class="hidden">
        
        <!-- Header -->
        <header class="app-header">
            <h2>3D Cube Editor</h2>
            <div class="header-actions">
                <button id="install-btn" class="icon-btn" aria-label="Install App" style="display: none;">📥</button>
                <button id="settings-btn" class="icon-btn" aria-label="Settings">⚙️</button>
                <button id="theme-btn" class="icon-btn theme-toggle-btn" aria-label="Toggle Theme">🌙</button>
            </div>
        </header>

        <!-- Main Workspace Container -->
        <main class="workspace-container">
            
            <!-- Metadata Progress Indicator Box -->
            <div class="meta-indicator-bar">
                <div class="meta-item-left">
                    <span class="meta-label">Cube Face:</span>
                    <span id="face-counter" class="meta-value">1 / 6</span>
                </div>
                <div class="meta-item-right">
                    <span class="meta-label">Stickers Colored:</span>
                    <span id="filled-count" class="meta-value">0 / 54</span>
                </div>
            </div>
            
            <!-- Hidden native progress bar to maintain JS calculations safely -->
            <progress id="face-progress" max="6" value="1" style="display: none;"></progress>

            <!-- 3D WebGL Viewport Component -->
            <section class="viewport-panel">
                <div id="viewer"></div>
            </section>

            <!-- Action Controls Pane -->
            <section class="controls-panel">
                
                <!-- Full Width Validation trigger -->
                <button id="validate-btn" class="action-btn validate-action-btn" disabled>
                    Validate Face
                </button>

                <!-- Sticker Configuration Palette Row -->
                <div class="palette-container">
                    <h4 class="section-title">Color Picker</h4>
                    
                    <div class="color-picker-horizontal-row">
                        <button class="color-btn white" data-color="white">
                            <span class="color-circle"></span>
                            <span id="count-white" class="count-tag">0/9</span>
                        </button>
                        
                        <button class="color-btn green" data-color="green">
                            <span class="color-circle"></span>
                            <span id="count-green" class="count-tag">0/9</span>
                        </button>

                        <button class="color-btn red" data-color="red">
                            <span class="color-circle"></span>
                            <span id="count-red" class="count-tag">0/9</span>
                        </button>

                        <button class="color-btn blue" data-color="blue">
                            <span class="color-circle"></span>
                            <span id="count-blue" class="count-tag">0/9</span>
                        </button>

                        <button class="color-btn orange" data-color="orange">
                            <span class="color-circle"></span>
                            <span id="count-orange" class="count-tag">0/9</span>
                        </button>

                        <button class="color-btn yellow" data-color="yellow">
                            <span class="color-circle"></span>
                            <span id="count-yellow" class="count-tag">0/9</span>
                        </button>
                    </div>
                </div>

                <!-- Solution & Permutations Results Output Viewport Overlay -->
                <div id="solver-page" class="output-results-panel hidden">
                    <div id="loading-page" class="panel-sub-state hidden">
                        <div class="spinner-loader"></div>
                        <p>Processing state permutations...</p>
                    </div>

                    <div id="finish-page" class="panel-sub-state">
                        <div class="algorithm-readout-container">
                            <span class="readout-label">Computed Kociemba Sequence:</span>
                            <div class="algorithm-string">R U R' U' F' U2 F R U R' F' R U R' U' F'</div>
                        </div>
                    </div>
                </div>

            </section>
        </main>

        <!-- Fixed Interactive Bottom Navigation Bar -->
        <footer class="bottom-nav-bar">
            <button id="btn-prev-face" class="nav-btn prev-btn">Previous</button>
            <div class="nav-right-actions">
                <button id="btn-next-face" class="nav-btn next-btn">Next</button>
                <button id="solve-btn" class="nav-btn solve-btn" disabled>Solve Cube</button>
            </div>
        </footer>
    </div>

    <!-- System Toast Component -->
    <div id="toast" class="toast-notification-node">Initialization successful.</div>

</body>
</html>
