<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rubik Solver Pro</title>

<meta name="description"
content="Professional 3D Rubik Cube Solver">

<meta name="theme-color"
content="#4f46e5">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="style.css">

<link rel="stylesheet"
href="css/mobile.css">

<link rel="stylesheet"
href="css/desktop.css">

</head>

<body>

<div class="background"></div>

<div class="app">

<!-- =========================
     Header
========================= -->

<header class="topbar">

<div class="logo">

🧩 Rubik Solver Pro

</div>

<nav class="top-actions">

<button id="themeBtn"
title="Theme">

🌙

</button>

<button id="resetBtn"
title="Reset Cube">

Reset

</button>

</nav>

</header>

<!-- =========================
     Main Layout
========================= -->

<main class="layout">

<!-- =========================
     Left Sidebar
========================= -->

<aside class="sidebar">

<h2>

Cube Setup

</h2>

<p class="subtitle">

Customize your cube

</p>

<div class="progress-card">

<p>

Progress

</p>

<div class="progress">

<div id="progressBar">

</div>

</div>

<span id="progressText">

0%

</span>

</div>

<div class="toolbox">

<button id="scrambleBtn">

Random Scramble

</button>

<button id="clearBtn">

Clear Cube

</button>

<button id="solveBtn">

Solve Cube

</button>

</div>

</aside>
